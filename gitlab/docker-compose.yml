version: "3"

services:
  sonarqube:
    image: sonarqube:community
    depends_on:
      - db
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    ports:
      - "9000:9000"

  db:
    image: postgres:12
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
    volumes:
      - postgresql:/var/lib/postgresql
      - postgresql_data:/var/lib/postgresql/data

  # --- ДОБАВЛЯЕМ GITLAB ---
  gitlab:
    image: 'gitlab/gitlab-ce:15.11.13-ce.0' # Облегченная версия, чтобы не вешать систему
    restart: always
    hostname: 'gitlab.localdomain'
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://gitlab.localdomain'
        puma['worker_processes'] = 2
        sidekiq['max_concurrency'] = 10
    ports:
      - '80:80'
      - '443:443'
      - '2222:22'
    volumes:
      - gitlab_config:/etc/gitlab
      - gitlab_logs:/var/log/gitlab
      - gitlab_data:/var/opt/gitlab

  # --- ДОБАВЛЯЕМ RUNNER ---
  runner:
    image: 'gitlab/gitlab-runner:latest'
    restart: always
    depends_on:
      - gitlab
    volumes:
      - runner_config:/etc/gitlab-runner
      - '/var/run/docker.sock:/var/run/docker.sock' # Обязательно для DinD (сборки докера в докере)

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  postgresql:
  postgresql_data:
  # Добавляем новые хранилища для гиталба:
  gitlab_config:
  gitlab_logs:
  gitlab_data:
  runner_config:
